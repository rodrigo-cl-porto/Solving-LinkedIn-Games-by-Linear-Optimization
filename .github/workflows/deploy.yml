# Deploy Jupyter Book 2 (MyST) to GitHub Pages
name: Jupyter Book (via MyST) GitHub Pages Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  BASE_URL: /${{ github.event.repository.name }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # 👉 roda os comandos dentro de ./book
    defaults:
      run:
        working-directory: book

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install MyST CLI
        run: npm install -g mystmd
        # (opção equivalente)
        # run: npm install -g jupyter-book

      - name: Build static HTML
        env:
          BASE_URL: ${{ env.BASE_URL }}
        run: myst build --html
        # (opção equivalente)
        # run: jupyter-book build --html

      - name: (debug) listar saídas do build
        run: |
          ls -la
          ls -la _build || true
          ls -la _build/html || true

      - name: Upload artifact to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # caminho relativo à RAIZ do repositório
          path: book/_build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
